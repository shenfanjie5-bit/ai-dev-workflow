# Codex Review agent configuration
# This agent is triggered by @codex review in PR comments

[review]
auto_review = false
severity_threshold = "P1"

[review.guidelines]
# P0 — block merge
p0 = [
  "Hardcoded secrets, API keys, or tokens",
  "Auth/session regressions",
  "Data-loss or migration issues",
  "Changes to permissions.deny without justification",
  "Removal of security hooks without replacement",
]

# P1 — flag for fix
p1 = [
  "Missing tests for changed business logic",
  "console.log left in production code",
  "Typos in user-facing strings",
  ".skip or .only left in test files",
  "Functions exceeding 50 lines without justification",
]
